name: Release

# Manual, gated release. This NEVER publishes automatically — it must be
# triggered by a maintainer via the Actions tab. By default it performs a dry
# run; set `dry_run: false` to actually publish to npm.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  release:
    name: Build & Publish to npm
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm --filter derivo test

      - name: Publish (dry run)
        if: ${{ inputs.dry_run }}
        working-directory: apps/cli
        run: pnpm publish --no-git-checks --dry-run

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        working-directory: apps/cli
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
